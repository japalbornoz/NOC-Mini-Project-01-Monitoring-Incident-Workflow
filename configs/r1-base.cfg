enable
configure terminal
hostname R1
no ip domain-lookup

interface FastEthernet0/0
 description TO_DSW1
 ip address 10.10.10.1 255.255.255.0
duplex full
 no shutdown

interface fa0/1
 description TO-VMNET1-MONITORING
 ip address 192.168.61.10 255.255.255.0
 no shut

ip route 0.0.0.0 0.0.0.0 dhcp

access-list 10 permit 192.168.61.1
snmp-server community NOCMONRO RO 10
snmp-server location GNS3-LAB
snmp-server contact James-Paul-Albornoz

line con 0
 exec-timeout 0 0
 logging synchronous

line vty 0 4
 login

end
write memory
