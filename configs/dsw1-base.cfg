enable
configure terminal
hostname DSW1
no ip domain-lookup

vlan 10
 name USERS

interface Ethernet0/0
 description TO_R1
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast

interface Ethernet0/1
 description TO_PC1
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast

interface Ethernet0/2
 description TO_SRV1
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast

interface Vlan10
 ip address 10.10.10.2 255.255.255.0
 no shutdown

access-list 10 permit 192.168.61.1
snmp-server community NOCMONRO RO 10
snmp-server location GNS3-LAB
snmp-server contact James-Paul-Albornoz

ip route 0.0.0.0 0.0.0.0 10.10.10.1

line con 0
 exec-timeout 0 0
 logging synchronous

line vty 0 4
 login

end
write memory
